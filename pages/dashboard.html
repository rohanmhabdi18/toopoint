<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Towards Point</title>
    <link rel="stylesheet" href="../css/homestyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --apple-blue: #007aff;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-top: 72px;
        }

        .navbar {
            padding: 0.65rem 0;
        }

        .nav-container {
            gap: 0.75rem;
            padding: 0 1.25rem;
        }

        .logo h2 {
            font-size: 1.35rem;
            padding: 0.3rem 0.6rem;
        }

        .logo h2 a.logo img {
            height: 42px !important;
            margin-right: 4px !important;
        }

        .nav-menu {
            gap: 1rem;
        }

        .nav-menu a {
            padding: 0.4rem 0.75rem;
            font-size: 0.95rem;
        }

        .login-btn button {
            padding: 0.65rem 1rem;
            font-size: 0.92rem;
            margin-right: 0;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
        }

        /* Sidebar Profile Card */
        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            background: var(--apple-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
        }

        /* Main Content Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .stat-card i { font-size: 2rem; color: var(--apple-blue); }

        /* Activity Tables/Lists */
        .activity-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th { text-align: left; color: #64748b; padding: 12px; font-size: 0.9rem; }
        .data-table td { padding: 12px; border-top: 1px solid #f1f5f9; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #dcfce7;
            color: #166534;
        }

        .no-data { text-align: center; color: #94a3b8; padding: 40px; }

        /* Dashboard navbar icons styling */
        .nav-menu i {
            margin-right: 8px;
            font-size: 1.1rem;
        }

        .login-btn button i {
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            body {
                padding-top: 68px;
            }

            .nav-container {
                padding: 0 1rem;
            }

            .logo h2 {
                font-size: 1.05rem;
                padding: 0.2rem 0.35rem;
            }

            .logo h2 a.logo img {
                height: 36px !important;
            }

            .login-btn button {
                padding: 0.55rem 0.85rem;
                font-size: 0.85rem;
            }
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h2><a href="dashboard.html" class="logo"><img src="../images/Logo.gif" alt="Logo" style="height:52px; margin-right:5px; vertical-align:middle;"></a>Towards Point</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="index.html#tools"><i class="fas fa-compass"></i> Travel Hub</a></li>
                <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> My Dashboard</a></li>
            </ul>
            <div class="login-btn">
                <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="profile-card">
            <div class="profile-pic" id="user-initial">U</div>
            <h3 id="user-name">Loading...</h3>
            <p id="user-email" style="color: #64748b; font-size: 0.9rem;"></p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <div style="text-align: left;">
                <p><i class="fas fa-map-marker-alt"></i> Mumbai, India</p>
                <p><i class="fas fa-calendar"></i> Member since 2026</p>
            </div>
        </aside>

        <main>
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-wallet"></i>
                    <div>
                        <small>Total Spent</small>
                        <h2 id="dash-total-spent">₹0</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-suitcase"></i>
                    <div>
                        <small>Bookings</small>
                        <h2 id="dash-booking-count">0</h2>
                    </div>
                </div>
            </div>

            <section class="activity-section">
                <div class="activity-header">
                    <h3>Recent Bookings</h3>
                    <i class="fas fa-history"></i>
                </div>
                <div id="booking-list">
                    <div class="no-data">No bookings found. <a href="index.html">Book now!</a></div>
                </div>
            </section>

            <section class="activity-section">
                <div class="activity-header">
                    <h3>Recent Expenses</h3>
                    <i class="fas fa-receipt"></i>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="expense-history">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script type="module">
        import {
            auth,
            collection,
            db,
            getDocs,
            onAuthStateChanged,
            query,
            signOut
        } from "../js/firebase-config.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const name = user.email.split('@')[0];
                document.getElementById('user-name').innerText = name.toUpperCase();
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-initial').innerText = name.charAt(0).toUpperCase();

                // 1. Load Budget from LocalStorage (based on your existing logic)
                const total = localStorage.getItem('totalSpent_' + user.email) || "0";
                document.getElementById('dash-total-spent').innerText = "₹" + total;
                
                const history = localStorage.getItem('expenseHtml_' + user.email);
                if(history) {
                    document.getElementById('expense-history').innerHTML = history;
                }

                // 2. Fetch Group Bookings from Firestore
                const q = query(collection(db, "groupBookings")); // In a real app, filter by user ID
                const querySnapshot = await getDocs(q);
                const bookingList = document.getElementById('booking-list');
                
                if (!querySnapshot.empty) {
                    bookingList.innerHTML = "";
                    document.getElementById('dash-booking-count').innerText = querySnapshot.size;
                    
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        bookingList.innerHTML += `
                            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                                <div>
                                    <strong>Group Booking for ${data.count} People</strong><br>
                                    <small>${data.bookingDate ? new Date(data.bookingDate).toLocaleDateString() : 'N/A'}</small>
                                </div>
                                <span class="status-badge">Confirmed</span>
                            </div>
                        `;
                    });
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        window.logout = () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        };
    </script>
</body>
</html>
